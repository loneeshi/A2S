<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - Agent Visualization</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: monospace;
      background: #1a1a1a;
      color: #fff;
    }
    .log {
      background: #2d2d2d;
      padding: 10px;
      margin: 10px 0;
      border-left: 3px solid #4CAF50;
      border-radius: 4px;
    }
    .error {
      border-left-color: #f44336;
      background: #3d1a1a;
    }
    .info {
      border-left-color: #2196F3;
    }
    h1 {
      color: #4CAF50;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <h1>🔍 Debug Console</h1>
  <div id="logs"></div>
  <button onclick="testReact()">Test React Loading</button>
  <button onclick="testComponents()">Test All Components</button>
  <button onclick="clearLogs()">Clear Logs</button>

  <script type="module">
    const logsDiv = document.getElementById('logs');

    function log(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `log ${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logsDiv.appendChild(div);
      console.log(`[${type}]`, message);
    }

    function clearLogs() {
      logsDiv.innerHTML = '';
    }

    // Log page load
    log('✅ Debug page loaded successfully', 'info');

    // Test React import
    window.testReact = async function() {
      try {
        log('Testing React import...', 'info');
        const React = await import('/node_modules/.vite/deps/react.js?v=b48b46dd');
        log(`✅ React loaded: ${React.version || 'unknown'}`, 'info');

        const ReactDOM = await import('/node_modules/.vite/deps/react-dom_client.js?v=b48b46dd');
        log(`✅ ReactDOM loaded`, 'info');

        // Test rendering
        const root = ReactDOM.createRoot(document.getElementById('root') || document.body);
        log('✅ ReactDOM.createRoot works', 'info');

      } catch (e) {
        log(`❌ React test failed: ${e.message}`, 'error');
        console.error(e);
      }
    };

    // Test all components
    window.testComponents = async function() {
      try {
        log('Testing component imports...', 'info');

        const modules = [
          '/src/App.tsx',
          '/src/components/LiquidGraphCanvas.tsx',
          '/src/components/AgentCognitiveInspector.tsx',
          '/src/components/TimelineScrubber.tsx',
          '/src/store/agentStore.ts',
          '/src/store/timelineStore.ts',
        ];

        for (const mod of modules) {
          try {
            await import(mod);
            log(`✅ ${mod} loaded successfully`, 'info');
          } catch (e) {
            log(`❌ ${mod} failed: ${e.message}`, 'error');
          }
        }
      } catch (e) {
        log(`❌ Component test failed: ${e.message}`, 'error');
        console.error(e);
      }
    };

    window.clearLogs = clearLogs;

    // Auto-test on load
    setTimeout(async () => {
      log('🚀 Starting automatic tests...', 'info');

      // Check if main app loads
      try {
        await import('/src/main.tsx');
        log('✅ main.tsx loaded', 'info');
      } catch (e) {
        log(`❌ main.tsx failed: ${e.message}`, 'error');
        console.error(e);
      }
    }, 1000);

    // Catch all errors
    window.addEventListener('error', (e) => {
      log(`❌ Global Error: ${e.message} at ${e.filename}:${e.lineno}`, 'error');
    });

    window.addEventListener('unhandledrejection', (e) => {
      log(`❌ Unhandled Promise: ${e.reason}`, 'error');
    });
  </script>

  <div id="root" style="display:none;"></div>
</body>
</html>
